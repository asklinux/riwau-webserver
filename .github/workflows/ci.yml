name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  linux-fast:
    name: Linux fast build and tests
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "2"
      CTEST_OUTPUT_ON_FAILURE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            gawk \
            gettext \
            git \
            m4 \
            make \
            ninja-build \
            perl \
            python3 \
            unzip

      - name: Configure
        run: |
          cmake -S . -B build-ci -G Ninja \
            -DRIMAU_ENABLE_TESTS=ON \
            -DRIMAU_FULLY_STATIC_SERVER=OFF \
            -DRIMAU_USE_BUNDLED_GLIBC=OFF

      - name: Build
        run: cmake --build build-ci

      - name: Test
        run: ctest --test-dir build-ci --output-on-failure

      - name: CLI smoke
        run: |
          ./build-ci/rimau-server --database build-ci/ci.sqlite3 --check-config
          ./build-ci/rimau-server --database build-ci/ci.sqlite3 --protocols
          ./build-ci/rimau-waf-tests
