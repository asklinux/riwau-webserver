<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rimau Web Server</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #f9fafb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(720px, calc(100vw - 32px));
    }
    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      margin: 0 0 12px;
      letter-spacing: 0;
    }
    p {
      color: #d1d5db;
      font-size: 1.125rem;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Rimau Web Server</h1>
    <p>C++ HTTP/1.1 scaffold is running. HTTP/2 and HTTP/3 integration points are documented for the next implementation phase.</p>
  </main>
</body>
</html>
